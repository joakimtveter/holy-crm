services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2025-latest
    platform: linux/amd64
    container_name: holy-crm-db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Holly_CRM_Dev123!
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql

volumes:
  sqlserver-data:
